# Fix prefix to Ctrl+A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Better terminal compatibility
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g focus-events on

# YubiKey / SSH Agent forwarding support (Issue #39)
set-environment -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# Usability
set-option -g mouse on
set -s set-clipboard on
set-option -g status-left-length 50
set-option -g repeat-time 200

# Pane dimming and highlighting
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=black'
set -g pane-border-style 'fg=colour235,bg=colour238'
set -g pane-active-border-style 'fg=colour51,bg=colour236'

# Disable mouse pane resizing
unbind -n MouseDrag1Border

# Fix mouse selection (Issue #34)
# Rely on set-clipboard on (OSC 52) for seamless clipboard integration.
# This prevents newlines from being added to wrapped text.
# The 'no-clear' variant prevents the screen from jumping to the bottom after selection.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Clear selection but stay in copy mode on single click (prevents jump to bottom)
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind-key -T copy-mode MouseDown1Pane select-pane \; send-keys -X clear-selection

# Fix for scrolling issues in some terminals like IntelliJ
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# screen-like key bindings
bind-key A command-prompt "rename-window '%%'"
bind-key '"' "choose-window"

# Window setup
# Use a session-created hook to avoid "no current target" errors.
set-hook -g session-created '
  rename-window "Shell";
'


# Kill the bells
set -g bell-action none
set -g visual-bell off
