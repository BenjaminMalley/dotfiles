- name: Create dotfile directories
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - .config/ghostty
    - .config/nvim
    - .gemini
    - .gemini/policies
    - .claude/agents

- name: Symlink standard dotfiles
  ansible.builtin.file:
    src: "{{ playbook_dir }}/../{{ item.source }}"
    dest: "{{ ansible_user_dir }}/{{ item.dest }}"
    state: link
    force: true
  loop: "{{ dotfiles }}"

- name: Symlink optional dotfiles
  ansible.builtin.file:
    src: "{{ playbook_dir }}/../{{ item.source }}"
    dest: "{{ ansible_user_dir }}/{{ item.dest }}"
    state: link
    force: true
  loop: "{{ optional_dotfiles }}"
  when: install_optional | default(false) | bool

- name: Symlink agent files
  ansible.builtin.file:
    src: "{{ item }}"
    dest: "{{ ansible_user_dir }}/.claude/agents/{{ item | basename }}"
    state: link
    force: true
  with_fileglob:
    - "{{ playbook_dir }}/../agents/*"

- name: Symlink gemini policies
  ansible.builtin.file:
    src: "{{ item }}"
    dest: "{{ ansible_user_dir }}/.gemini/policies/{{ item | basename }}"
    state: link
    force: true
  with_fileglob:
    - "{{ playbook_dir }}/../gemini/policies/*"

- name: Symlink scripts directory
  ansible.builtin.file:
    src: "{{ playbook_dir }}/../scripts"
    dest: "{{ ansible_user_dir }}/{{ item }}/scripts"
    state: link
    force: true
  loop:
    - ".gemini"
    - ".claude"
