- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: homebrew_check
  when: install_packages | default(true) | bool

- name: Install Homebrew
  ansible.builtin.shell: |
    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: (install_packages | default(true) | bool) and not homebrew_check.stat.exists
  changed_when: true

- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true
  register: brew_update
  failed_when: brew_update is failed and 'Could not update' not in brew_update.msg and 'Fetching' not in brew_update.msg
  when: install_packages | default(true) | bool

- name: Install Homebrew formulae
  community.general.homebrew:
    name: "{{ homebrew_formulae }}"
    state: present
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
  register: brew_install_formulae
  until: brew_install_formulae is succeeded
  retries: 3
  delay: 5
  when: install_packages | default(true) | bool

- name: Upgrade Homebrew formulae
  ansible.builtin.command: /opt/homebrew/bin/brew upgrade --formula {{ homebrew_formulae | join(' ') }}
  register: brew_upgrade_formulae
  changed_when: "'Already up-to-date' not in brew_upgrade_formulae.stdout"
  failed_when: false
  when: install_packages | default(true) | bool

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name: "{{ homebrew_casks }}"
    state: present
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
  register: brew_install_casks
  until: brew_install_casks is succeeded
  retries: 3
  delay: 5
  when: install_packages | default(true) | bool

- name: Install optional Homebrew formulae
  community.general.homebrew:
    name: "{{ optional_homebrew_formulae }}"
    state: present
    upgrade: true
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
  register: brew_install_optional_formulae
  until: brew_install_optional_formulae is succeeded
  retries: 3
  delay: 5
  when: (install_packages | default(true) | bool) and (install_optional | default(false) | bool)

- name: Install optional Homebrew casks
  community.general.homebrew_cask:
    name: "{{ optional_homebrew_casks }}"
    state: present
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
  register: brew_install_optional_casks
  until: brew_install_optional_casks is succeeded
  retries: 3
  delay: 5
  when: (install_packages | default(true) | bool) and (install_optional | default(false) | bool)

- name: Remove unused Homebrew dependencies (autoremove)
  ansible.builtin.command: /opt/homebrew/bin/brew autoremove
  register: brew_autoremove
  changed_when: brew_autoremove.stdout != ""
  when: install_packages | default(true) | bool
