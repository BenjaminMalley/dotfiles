[FreeLook1]
Device = SDL/0/Nintendo Switch Pro Controller
Move/Forward = @(Shift+W)
Move/Backward = @(Shift+S)
Speed/Decrease = @(Shift+`1`)
Speed/Increase = @(Shift+`2`)
Speed/Reset = @(Shift+F)
Other/Reset View = `Thumb R`
Field of View/Increase X = @(Shift+`Axis Z+`)
Field of View/Decrease X = @(Shift+`Axis Z-`)
Field of View/Increase Y = @(Shift+`Axis Z+`)
Field of View/Decrease Y = @(Shift+`Axis Z-`)
Incremental Rotation/Pitch Up = `Right Y+`
Incremental Rotation/Pitch Down = `Right Y-`
Incremental Rotation/Yaw Left = `Right X-`
Incremental Rotation/Yaw Right = `Right X+`
